services:
  rusty-tts:
    build:
      context: .
      # Optional: specify target if you want to build only to builder stage for debugging
      # target: builder
    container_name: rusty-tts-app
    ports:
      - "127.0.0.1:8887:8887"
    networks:
      - rusty
    depends_on:
      coqui-tts:
        condition: service_healthy
      piper-tts:
        condition: service_healthy
    environment:
      # CORS configuration - customize as needed
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080,https://tts.example.com
      # Optional: Set custom audio directory
      # - AUDIO_DIR=audio_files
    volumes:
      # Persist audio files between container restarts
      - audio_files:/app/audio_files
      # Optional: Mount local development code (uncomment for development)
      - .:/app
      # Proprietary Apple IIe/Disk II/speech-card ROMs for the MAME-based
      # Textalker/Echo II Plus automation (gitignored, sourced manually -
      # see mame_roms/apple2ee/). Read-only: MAME never writes to its
      # rompath.
      - ./mame_roms:/mame_roms:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8887/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Increased start_period since multi-stage builds might take slightly longer on first run
      start_period: 45s
    # Resource limits - you might be able to reduce these now with smaller runtime image
    deploy:
      resources:
        limits:
          memory: 1.5G  # Reduced from 2G since no build tools in runtime
          cpus: '1.0'
        reservations:
          memory: 384M  # Reduced from 512M
          cpus: '0.5'

  coqui-tts:
    build:
      context: ./coqui
    container_name: rusty-tts-coqui
    networks:
      - rusty
    volumes:
      # Persist downloaded model weights (~500MB) between restarts, so
      # only the very first boot pays the download cost.
      - coqui_models:/root/.local/share/tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8891/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      # First boot downloads + loads model+vocoder weights, which can take
      # several minutes.
      start_period: 600s
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  piper-tts:
    build:
      context: ./piper
    container_name: rusty-tts-piper
    networks:
      - rusty
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8892/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  # Optional: Add a reverse proxy (uncomment if needed)
  # nginx:
  #   image: nginx:alpine
  #   container_name: rusty-tts-proxy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - rusty-tts
  #   restart: unless-stopped

volumes:
  audio_files:
    driver: local
  coqui_models:
    driver: local

networks:
  rusty:
    external: true
